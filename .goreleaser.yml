before:
  hooks:
    - go mod download
builds:
  - id: gobl.mx.cfdi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    main: ./cmd/gobl.mx.cfdi
    binary: gobl.mx.cfdi

archives:
  - id: gobl.mx.cfdi
    builds:
      - gobl.mx.cfdi
    format: tar.gz
    name_template: "gobl.mx.cfdi_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ .Tag }}"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
release:
  github:
    owner: invopop
    name: gobl.mx.cfdi
  prerelease: auto
